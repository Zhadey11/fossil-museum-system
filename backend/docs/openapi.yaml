openapi: 3.0.3
info:
  title: Fossil Museum API
  version: 1.0.0
  description: API REST del sistema de fósiles.
servers:
  - url: http://localhost:4000
paths:
  /api/health:
    get:
      summary: Estado de servicio
      responses:
        "200":
          description: OK
  /api/auth/login:
    post:
      summary: Iniciar sesión
      requestBody:
        required: true
      responses:
        "200":
          description: Token JWT
  /api/auth/logout:
    post:
      summary: Cerrar sesión
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sesión cerrada
  /api/fosiles:
    get:
      summary: Listar fósiles públicos
      description: |
        Devuelve información pública del catálogo. No expone coordenadas GPS ni código único.
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: categoria_id
          schema: { type: integer }
        - in: query
          name: era_id
          schema: { type: integer }
        - in: query
          name: periodo_id
          schema: { type: integer }
        - in: query
          name: ubicacion
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: page_size
          schema: { type: integer }
      responses:
        "200": { description: Lista de fósiles }
  /api/fosiles/publico/mapa:
    get:
      summary: Puntos para mapa público (fósiles publicados)
      description: |
        Devuelve solo los campos mínimos para renderizar el mapa público:
        id, slug, nombre, latitud, longitud, categoría, portada y jerarquía
        geográfica (cantón, provincia, país) cuando existan en BD.
      responses:
        "200":
          description: Lista de puntos del mapa público
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicMapPoint"
    post:
      summary: Crear fósil
      security:
        - bearerAuth: []
      responses:
        "200": { description: Fósil creado }
  /api/fosiles/{id}:
    get:
      summary: Obtener ficha pública por ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Ficha pública }
    put:
      summary: Actualizar fósil (admin o explorador dueño)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Fósil actualizado }
    delete:
      summary: Soft-delete de fósil (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Fósil eliminado lógicamente }
  /api/fosiles/{id}/detalle:
    get:
      summary: Obtener detalle científico completo
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Detalle científico (roles admin/investigador) }
        "403": { description: Sin autorización para este fósil }
  /api/multimedia/publico/catalogo:
    get:
      summary: Listar imágenes públicas del catálogo (paginado)
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: categoria_id
          schema: { type: integer }
        - in: query
          name: era_id
          schema: { type: integer }
        - in: query
          name: periodo_id
          schema: { type: integer }
        - in: query
          name: subtipo
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: page_size
          schema: { type: integer }
      responses:
        "200": { description: Lista de imágenes públicas }
  /api/estudios:
    get:
      summary: Listar estudios científicos por fósil (requiere autorización)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: fosil_id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Lista de estudios }
        "403": { description: Sin acceso al fósil solicitado }
  /api/fosiles/mis-registros:
    get:
      summary: Listar registros del explorador autenticado (o admin)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Lista de registros propios }
  /api/fosiles/investigador/catalogo:
    get:
      summary: Catálogo de investigación (autorizado)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Lista de fósiles para investigación }
  /api/fosiles/{id}/estado:
    put:
      summary: Cambiar estado de fósil (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Estado actualizado }
  /api/multimedia/publico/fosil/{fosil_id}:
    get:
      summary: Galería pública de multimedia por fósil
      parameters:
        - in: path
          name: fosil_id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Multimedia pública del fósil }
  /api/multimedia/fosil/{fosil_id}:
    get:
      summary: Listar multimedia de fósil (admin/explorador)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: fosil_id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Multimedia del fósil }
  /api/multimedia:
    post:
      summary: Crear registro multimedia manual (admin)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Multimedia creada }
  /api/multimedia/{id}:
    delete:
      summary: Eliminar multimedia (admin/explorador dueño)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Multimedia eliminada }
  /api/investigacion/solicitudes:
    post:
      summary: Crear solicitud de acceso a investigación
      security:
        - bearerAuth: []
      responses:
        "200": { description: Solicitud registrada }
  /api/investigacion/mis-solicitudes:
    get:
      summary: Listar solicitudes del investigador autenticado
      security:
        - bearerAuth: []
      responses:
        "200": { description: Lista de solicitudes }
  /api/usuarios:
    get:
      summary: Listar usuarios (admin)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Lista de usuarios }
    post:
      summary: Crear usuario (admin)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Usuario creado }
  /api/usuarios/catalogo/roles:
    get:
      summary: Catálogo de roles (admin)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Lista de roles }
  /api/usuarios/{id}:
    get:
      summary: Obtener usuario por ID (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Usuario }
    put:
      summary: Actualizar usuario (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Usuario actualizado }
    delete:
      summary: Soft-delete usuario (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Usuario eliminado }
  /api/usuarios/{id}/roles:
    put:
      summary: Reasignar roles de usuario (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Roles actualizados }
  /api/usuarios/{id}/activo:
    patch:
      summary: Activar/desactivar usuario (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Estado actualizado }
  /api/contacto:
    get:
      summary: Listar mensajes de contacto (admin)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Lista de mensajes }
    post:
      summary: Enviar mensaje de contacto
      responses:
        "200": { description: Mensaje recibido }
  /api/catalogos/fosil-form:
    get:
      summary: Catálogos para formulario de fósil (admin/explorador)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Catálogos de apoyo }
  /api/taxonomia:
    get:
      summary: Listar taxonomía (auth)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Lista taxonómica }
    post:
      summary: Crear taxonomía (admin)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Taxonomía creada }
  /api/taxonomia/{id}:
    get:
      summary: Obtener taxonomía por ID (auth)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Taxonomía }
    delete:
      summary: Eliminar taxonomía (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Taxonomía eliminada }
  /api/geologia:
    get:
      summary: Listar información geológica (auth)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Geología listada }
  /api/ubicacion:
    get:
      summary: Listar ubicaciones (auth)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Ubicaciones listadas }
  /api/admin/fosiles/pendientes:
    get:
      summary: Listar fósiles pendientes de revisión
      security:
        - bearerAuth: []
      responses:
        "200": { description: Lista de pendientes }
  /api/admin/fosiles/{id}/aprobar:
    patch:
      summary: Aprobar fósil pendiente
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Fósil aprobado }
  /api/admin/fosiles/{id}/rechazar:
    patch:
      summary: Rechazar fósil pendiente
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Fósil rechazado }
  /api/multimedia/upload-fosil:
    post:
      summary: Subir archivos multimedia para fósil
      security:
        - bearerAuth: []
      responses:
        "200": { description: Archivos subidos }
components:
  schemas:
    PublicMapPoint:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string, nullable: true }
        nombre: { type: string }
        latitud: { type: number }
        longitud: { type: number }
        categoria_codigo: { type: string, nullable: true }
        portada_url: { type: string, nullable: true }
        canton_nombre: { type: string, nullable: true }
        provincia_nombre: { type: string, nullable: true }
        pais_nombre: { type: string, nullable: true }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
